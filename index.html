<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IceBug Elite | Kanpur's Finest Gym</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'agency-dark': '#080808', 'agency-orange': '#f97316' },
                    fontFamily: { inter: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #080808; cursor: none; } /* Custom Cursor ready */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .hero-video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1; overflow: hidden; }
        .hero-video-container video { object-fit: cover; width: 100%; height: 100%; transform: scale(1.1); }
        
        /* Custom Cursor */
        #cursor { width: 20px; height: 20px; background: #f97316; border-radius: 50%; position: fixed; pointer-events: none; z-index: 999; mix-blend-mode: difference; transition: transform 0.1s; }
        
        /* 3D Card Hover Base */
        .tilt-card { transition: transform 0.1s ease-out; transform-style: preserve-3d; }
        .parallax-section { position: relative; z-index: 10; margin-top: 100vh; background: #080808; }
        
        .neon-glow { text-shadow: 0 0 20px rgba(249, 115, 22, 0.5); }
    </style>
</head>
<body class="text-white font-inter antialiased">

    <div id="cursor"></div>

    <div class="hero-video-container">
        <video autoplay muted loop playsinline id="heroVideo">
            <source src="Gym_Demo/gym-hero.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-black/60"></div>
    </div>

    <section class="h-screen flex items-center px-6 md:px-12 relative z-20" id="heroText">
        <div class="max-w-7xl mx-auto w-full">
            <h1 class="text-7xl md:text-[150px] font-black uppercase tracking-tighter leading-none mb-6">
                ELITE <br><span class="text-agency-orange neon-glow">STRENGTH.</span>
            </h1>
            <p class="text-xl md:text-2xl text-gray-400 mb-10 max-w-2xl font-light">Experience the future of fitness in Kanpur. Immersion starts now.</p>
            <div class="flex space-x-6">
                <button class="bg-agency-orange text-black px-12 py-5 rounded-full font-bold uppercase tracking-widest hover:scale-110 transition-transform">Claim Pass</button>
            </div>
        </div>
    </section>

    <main class="parallax-section">
        
        <section class="py-32 px-6 reveal">
            <div class="max-w-4xl mx-auto glass p-16 rounded-[40px] text-center border-t border-agency-orange/20">
                <h2 class="text-5xl font-black mb-12 italic uppercase">AI Performance <span class="text-agency-orange">Hub</span></h2>
                <div class="grid md:grid-cols-2 gap-8">
                    <input id="weight" type="number" placeholder="Weight (kg)" class="bg-black border border-white/10 p-6 rounded-2xl outline-none focus:border-agency-orange transition">
                    <input id="height" type="number" placeholder="Height (cm)" class="bg-black border border-white/10 p-6 rounded-2xl outline-none focus:border-agency-orange transition">
                    <button onclick="calculateBMI()" class="md:col-span-2 bg-white text-black font-black py-6 rounded-2xl uppercase tracking-tighter hover:bg-agency-orange transition">Analyze My Physique</button>
                </div>
                <div id="bmiResult" class="mt-8 text-4xl font-black text-agency-orange"></div>
            </div>
        </section>

        <section class="py-32 px-6">
            <h3 class="text-center text-7xl font-black mb-24 tracking-tighter uppercase">Packages</h3>
            <div class="grid md:grid-cols-3 gap-12 max-w-7xl mx-auto">
                
                <div class="tilt-card glass p-12 rounded-[30px] border border-white/5 hover:border-agency-orange/40 transition-colors">
                    <h4 class="text-gray-500 font-bold mb-4 uppercase">Starter</h4>
                    <div class="text-6xl font-black mb-8">₹1,499</div>
                    <ul class="space-y-4 mb-12 text-gray-400 font-light italic text-sm">
                        <li><i class="fas fa-check text-agency-orange mr-2"></i>Full Access</li>
                        <li><i class="fas fa-check text-agency-orange mr-2"></i>Standard Locker</li>
                    </ul>
                    <button class="w-full py-4 border border-white/20 rounded-xl hover:bg-white hover:text-black font-bold uppercase transition">Select</button>
                </div>

                <div class="tilt-card bg-agency-orange p-12 rounded-[30px] shadow-2xl shadow-orange-950/50 scale-110 relative overflow-hidden text-black">
                    <div class="absolute top-5 right-5 font-black text-xs uppercase tracking-widest opacity-40">Most Elite</div>
                    <h4 class="font-bold mb-4 uppercase">Pro Athlete</h4>
                    <div class="text-6xl font-black mb-8">₹2,999</div>
                    <ul class="space-y-4 mb-12 font-medium italic text-sm">
                        <li><i class="fas fa-bolt mr-2"></i>Personal Trainer</li>
                        <li><i class="fas fa-bolt mr-2"></i>AI Nutrition Chart</li>
                    </ul>
                    <button class="w-full py-4 bg-black text-white rounded-xl font-bold uppercase transition">Join Elite</button>
                </div>

                <div class="tilt-card glass p-12 rounded-[30px] border border-white/5 hover:border-agency-orange/40 transition-colors">
                    <h4 class="text-gray-500 font-bold mb-4 uppercase">Elite</h4>
                    <div class="text-6xl font-black mb-8">₹4,999</div>
                    <ul class="space-y-4 mb-12 text-gray-400 font-light italic text-sm">
                        <li><i class="fas fa-check text-agency-orange mr-2"></i>Sauna Access</li>
                        <li><i class="fas fa-check text-agency-orange mr-2"></i>Spa & Recovery</li>
                    </ul>
                    <button class="w-full py-4 border border-white/20 rounded-xl hover:bg-white hover:text-black font-bold uppercase transition">Select</button>
                </div>

            </div>
        </section>

    </main>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. Custom Cursor Follow
        const cursor = document.querySelector('#cursor');
        window.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.3 });
        });

        // 2. Hero Immersive Zoom & Fade
        gsap.to("#heroVideo", {
            scrollTrigger: {
                trigger: "#heroText",
                start: "top top",
                end: "bottom top",
                scrub: true
            },
            scale: 1.5,
            opacity: 0.3
        });

        gsap.to("#heroText", {
            scrollTrigger: {
                trigger: "#heroText",
                start: "top top",
                end: "bottom top",
                scrub: true
            },
            y: -200,
            opacity: 0
        });

        // 3. Staggered Section Reveal
        gsap.utils.toArray(".reveal").forEach(section => {
            gsap.from(section, {
                scrollTrigger: {
                    trigger: section,
                    start: "top 80%",
                },
                y: 100,
                opacity: 0,
                duration: 1.5,
                ease: "power4.out"
            });
        });

        // 4. 3D Tilt Effect on Cards
        const cards = document.querySelectorAll('.tilt-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const { left, top, width, height } = card.getBoundingClientRect();
                const x = (e.clientX - left - width / 2) / 10;
                const y = (e.clientY - top - height / 2) / 10;
                card.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateY(0deg) rotateX(0deg)`;
            });
        });

        // BMI Logic
        function calculateBMI() {
            const h = document.getElementById('height').value;
            const w = document.getElementById('weight').value;
            if (h && w) {
                const bmi = (w / ((h / 100) ** 2)).toFixed(1);
                document.getElementById('bmiResult').innerText = "BMI: " + bmi;
                gsap.from("#bmiResult", { scale: 0, duration: 0.5, ease: "back.out" });
            }
        }
    </script>
</body>
</html>
