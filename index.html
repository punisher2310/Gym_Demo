<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICEBUG | Premium Physical Estate</title>
    
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,400,600,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        'c-deep': '#190019',
                        'c-dark': '#2B124C',
                        'c-mid': '#522B5B',
                        'c-soft': '#854F6C',
                        'c-light': '#DFB6B2',
                        'c-cream': '#FBE4D8'
                    },
                    fontFamily: { 
                        display: ['Clash Display', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'] 
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #190019; color: #FBE4D8; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }
        
        /* Preloader Styles */
        #preloader { position: fixed; inset: 0; background-color: #190019; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lang-text { font-family: 'Clash Display', sans-serif; font-size: clamp(3rem, 8vw, 6rem); font-weight: 600; color: #FBE4D8; opacity: 0; position: absolute; }
        
        /* Hero Video Styles */
        .hero-video-wrapper { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
        .hero-video-wrapper video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4) saturate(1.2); transform: scale(1.05); }
        .hero-overlay { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent 0%, #190019 100%); }
        
        .hero-content { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        /* Luxury Outline Text */
        .text-outline { color: transparent; -webkit-text-stroke: 1px rgba(251, 228, 216, 0.6); }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="relative w-full h-32 flex justify-center items-center">
            <span class="lang-text">Hello</span>
            <span class="lang-text">नमस्ते</span>
            <span class="lang-text">Bonjour</span>
            <span class="lang-text">Hola</span>
            <span class="lang-text text-c-light">ICEBUG.</span>
        </div>
        <div class="w-48 h-[1px] bg-c-mid mt-8 relative overflow-hidden">
            <div id="progress-bar" class="absolute top-0 left-0 h-full bg-c-cream w-0"></div>
        </div>
    </div>

    <main id="main-content" class="opacity-0">
        <div class="hero-video-wrapper">
            <video autoplay muted loop playsinline>
                <source src="gym-hero.mp4" type="video/mp4">
            </video>
            <div class="hero-overlay"></div>
        </div>

        <nav class="absolute top-0 w-full p-8 flex justify-between items-center z-50 mix-blend-difference">
            <div class="font-display text-2xl font-bold tracking-widest text-c-cream">ICEBUG</div>
            <button class="text-xs uppercase tracking-widest font-bold border border-c-light/30 px-6 py-2 rounded-full hover:bg-c-cream hover:text-c-deep transition-all">Apply</button>
        </nav>

        <section class="hero-content px-4">
            <div class="overflow-hidden">
                <h1 class="font-display text-[15vw] md:text-[10rem] font-bold leading-none hero-text transform translate-y-full">
                    <span class="text-outline">THE</span> ESTATE
                </h1>
            </div>
            <div class="overflow-hidden mt-4">
                <p class="text-c-light text-sm md:text-xl uppercase tracking-[0.4em] hero-text transform translate-y-full">
                    Engineered for the Elite
                </p>
            </div>
        </section>
    </main>

    <script>
        // Preloader Logic using GSAP
        const tl = gsap.timeline();
        const texts = document.querySelectorAll('.lang-text');
        
        // Cycle through languages
        texts.forEach((text, index) => {
            if (index < texts.length - 1) {
                tl.to(text, { opacity: 1, y: 0, duration: 0.4 })
                  .to(text, { opacity: 0, y: -20, duration: 0.4 }, "+=0.2");
            } else {
                // Final "ICEBUG" text
                tl.to(text, { opacity: 1, scale: 1.1, duration: 0.8 });
            }
        });

        // Progress bar animation syncing with text
        gsap.to("#progress-bar", { width: "100%", duration: tl.duration(), ease: "power1.inOut" });

        // Reveal Hero Section
        tl.to("#preloader", { yPercent: -100, duration: 1, ease: "power4.inOut", delay: 0.5 })
          .to("#main-content", { opacity: 1, duration: 0.1 }, "-=1")
          .to(".hero-text", { y: "0%", duration: 1.2, stagger: 0.2, ease: "power4.out" }, "-=0.5");
    </script>

</body>
</html>
