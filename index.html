<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IceBug Estate | Elite Biomechanical Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        :root { --gold: #c5a059; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-display { font-family: 'Clash Display', sans-serif; }
        .text-gold { color: var(--gold); }
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader">
        <h1 class="font-display text-4xl font-bold tracking-tighter">ICEBUG<span class="text-gold">.</span></h1>
    </div>

    <main id="content">
        
        <section class="h-screen flex items-center px-6 md:px-20 relative">
            <div class="max-w-7xl">
                <h2 class="hero-fade font-display text-6xl md:text-9xl font-bold uppercase tracking-tighter leading-none">
                    Uncompromised <br> <span class="text-gold italic">Strength.</span>
                </h2>
                <p class="hero-fade text-white/40 mt-8 max-w-md uppercase tracking-widest text-xs">
                    Kanpur's clinical-grade physical evolution lab in Swaroop Nagar.
                </p>
            </div>
        </section>

        </main>

    <footer class="py-20 border-t border-white/10 px-6 text-center">
        <div class="font-display font-bold text-2xl mb-4">ICEBUG.</div>
        <p class="text-[10px] text-white/20 uppercase tracking-[0.5em]">© 2026 IceBug Estate • Built for the 1%</p>
    </footer>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. Reveal Site
        window.addEventListener('load', () => {
            const tl = gsap.timeline();
            tl.to("#loader", { opacity: 0, duration: 0.8, onComplete: () => document.getElementById('loader').style.display = 'none' })
              .from(".hero-fade", { y: 50, opacity: 0, stagger: 0.2, duration: 1, ease: "power3.out" });
        });

        // 2. Simple Scroll Reveal
        gsap.utils.toArray("section").forEach(section => {
            gsap.from(section, {
                scrollTrigger: { trigger: section, start: "top 80%" },
                opacity: 0, y: 30, duration: 1
            });
        });
    </script>
</body>
</html>
